# ══════════════════════════════════════════════════════════════
# docker-compose.yml — Directorio Interactivo CASATIC 2026
# Levanta: PostgreSQL + API .NET + Frontend + pgAdmin
#
# Los secretos se leen del archivo .env (no se sube a Git).
# Copiar .env.example → .env y rellenar los valores.
# ══════════════════════════════════════════════════════════════
services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: casatic-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["postgres", "-c", "client_encoding=UTF8"]
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  # ── Backend API (.NET) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casatic-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/wwwroot/logos
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: casatic-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
